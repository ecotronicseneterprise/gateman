<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <defs>
    <linearGradient id="primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="eye" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- ─── MARK ───────────────────────────────────────────────
       A gate: two pillars + top bridge.
       The intelligence element: a scan arc + focal dot.
       Proportions on a 56×80 grid, centered at x=50.
  ──────────────────────────────────────────────────────── -->

  <!-- Left pillar -->
  <rect x="22" y="10" width="11" height="80" rx="5.5" fill="url(#primary)"/>
  <!-- Right pillar -->
  <rect x="67" y="10" width="11" height="80" rx="5.5" fill="url(#primary)"/>
  <!-- Top bridge (connecting bar) -->
  <rect x="22" y="10" width="56" height="11" rx="5.5" fill="url(#primary)"/>

  <!-- ─── WORDMARK ────────────────────────────────────────── -->
  <text
    x="114"
    y="68"
    font-family="'SF Pro Display', 'Helvetica Neue', 'Segoe UI', system-ui, sans-serif"
    font-size="52"
    font-weight="600"
    letter-spacing="-2"
    fill="#0F172A"
  >gateman</text>

</svg>
